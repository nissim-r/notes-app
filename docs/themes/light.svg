<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-label="Notes app light theme">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#18181b" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f4f5"/>
      <stop offset="100%" stop-color="#e4e4e7"/>
    </linearGradient>
  </defs>
  <rect width="960" height="560" fill="url(#bg)"/>
  <rect x="48" y="40" width="864" height="480" rx="16" fill="#fafafa" filter="url(#shadow)" stroke="#e4e4e7"/>
  <!-- Sidebar -->
  <rect x="48" y="40" width="280" height="480" rx="16" fill="#fafafa"/>
  <rect x="312" y="40" width="1" height="480" fill="#e4e4e7"/>
  <text x="72" y="78" font-family="Georgia, serif" font-size="22" font-weight="600" fill="#18181b">Notes</text>
  <rect x="240" y="58" width="64" height="28" rx="8" fill="#d97706"/>
  <text x="272" y="77" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#fff">New</text>
  <rect x="72" y="104" width="232" height="36" rx="8" fill="#fff" stroke="#e4e4e7"/>
  <text x="88" y="126" font-family="system-ui,sans-serif" font-size="13" fill="#a1a1aa">Search notes…</text>
  <!-- List rows -->
  <rect x="48" y="160" width="264" height="72" fill="#e4e4e7b3"/>
  <text x="72" y="188" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#18181b">Welcome to Notes</text>
  <text x="72" y="210" font-family="system-ui,sans-serif" font-size="12" fill="#71717a">A calm place for thoughts…</text>
  <circle cx="300" cy="184" r="4" fill="#f59e0b"/>
  <text x="72" y="250" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#27272a">Ideas worth keeping</text>
  <text x="72" y="272" font-family="system-ui,sans-serif" font-size="12" fill="#71717a">Morning pages without the…</text>
  <text x="72" y="312" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#27272a">Keyboard shortcuts</text>
  <text x="72" y="334" font-family="system-ui,sans-serif" font-size="12" fill="#71717a">N — New note · ⌘K search</text>
  <!-- Editor -->
  <rect x="313" y="40" width="599" height="480" fill="#ffffff"/>
  <text x="360" y="72" font-family="system-ui,sans-serif" font-size="12" fill="#a1a1aa">Edited 3h ago</text>
  <text x="360" y="140" font-family="Georgia, serif" font-size="32" font-weight="600" fill="#18181b">Welcome to Notes</text>
  <text x="360" y="188" font-family="system-ui,sans-serif" font-size="15" fill="#27272a">A calm place for thoughts.</text>
  <text x="360" y="216" font-family="system-ui,sans-serif" font-size="15" fill="#27272a">• Create a note with N</text>
  <text x="360" y="240" font-family="system-ui,sans-serif" font-size="15" fill="#27272a">• Search everything with ⌘K</text>
  <text x="360" y="264" font-family="system-ui,sans-serif" font-size="15" fill="#27272a">• Edits autosave as you type</text>
  <rect x="48" y="500" width="864" height="20" rx="0 0 16 16" fill="#fafafa"/>
  <text x="480" y="536" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#52525b">Light</text>
</svg>

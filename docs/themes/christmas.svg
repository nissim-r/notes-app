<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-label="Notes app Christmas theme">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#05140c" flood-opacity="0.55"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1f14"/>
      <stop offset="100%" stop-color="#123524"/>
    </linearGradient>
  </defs>
  <rect width="960" height="560" fill="url(#bg)"/>
  <!-- soft ornaments -->
  <circle cx="80" cy="500" r="40" fill="#c41e3a" opacity="0.15"/>
  <circle cx="900" cy="80" r="50" fill="#d4a017" opacity="0.12"/>
  <rect x="48" y="40" width="864" height="480" rx="16" fill="#0f2e1c" filter="url(#shadow)" stroke="#2d5a40"/>
  <rect x="48" y="40" width="280" height="480" rx="16" fill="#123524"/>
  <rect x="312" y="40" width="1" height="480" fill="#2d5a40"/>
  <text x="72" y="78" font-family="Georgia, serif" font-size="22" font-weight="600" fill="#f7f0e4">Notes</text>
  <rect x="240" y="58" width="64" height="28" rx="8" fill="#c41e3a"/>
  <text x="272" y="77" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#fff8f0">New</text>
  <rect x="72" y="104" width="232" height="36" rx="8" fill="#1a3d2a" stroke="#3d7354"/>
  <text x="88" y="126" font-family="system-ui,sans-serif" font-size="13" fill="#7a9a84">Search notes…</text>
  <rect x="48" y="160" width="264" height="72" fill="#245c3cb3"/>
  <text x="72" y="188" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#f7f0e4">Welcome to Notes</text>
  <text x="72" y="210" font-family="system-ui,sans-serif" font-size="12" fill="#a8c4b0">A calm place for thoughts…</text>
  <circle cx="300" cy="184" r="4" fill="#d4a017"/>
  <text x="72" y="250" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#ebe2d0">Ideas worth keeping</text>
  <text x="72" y="272" font-family="system-ui,sans-serif" font-size="12" fill="#a8c4b0">Morning pages without the…</text>
  <text x="72" y="312" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#ebe2d0">Keyboard shortcuts</text>
  <text x="72" y="334" font-family="system-ui,sans-serif" font-size="12" fill="#a8c4b0">N — New note · ⌘K search</text>
  <rect x="313" y="40" width="599" height="480" fill="#1a3d2a"/>
  <text x="360" y="72" font-family="system-ui,sans-serif" font-size="12" fill="#7a9a84">Edited 3h ago</text>
  <text x="360" y="140" font-family="Georgia, serif" font-size="32" font-weight="600" fill="#f7f0e4">Welcome to Notes</text>
  <text x="360" y="188" font-family="system-ui,sans-serif" font-size="15" fill="#ebe2d0">A calm place for thoughts.</text>
  <text x="360" y="216" font-family="system-ui,sans-serif" font-size="15" fill="#ebe2d0">• Create a note with N</text>
  <text x="360" y="240" font-family="system-ui,sans-serif" font-size="15" fill="#ebe2d0">• Search everything with ⌘K</text>
  <text x="360" y="264" font-family="system-ui,sans-serif" font-size="15" fill="#ebe2d0">• Edits autosave as you type</text>
  <!-- gold accent line -->
  <rect x="360" y="290" width="48" height="3" rx="1.5" fill="#d4a017" opacity="0.7"/>
  <text x="480" y="536" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#d4a017">Christmas</text>
</svg>

      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f4f4f5"/>
    </linearGradient>
    <filter id="card" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#18181b" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="1200" height="420" fill="url(#heroBg)"/>
  <!-- four mini windows -->
  <!-- light -->
